name: AI Image 

on:
  workflow_dispatch: # Manual run
  #schedule:
  #  - cron: '0 * * * *' # Runs every hour

jobs:
  generate-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push changes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Images Directory
        run: mkdir -p generated_images

      - name: Download AI Image
        run: |
          # 1. Define prompt (encoded for URL)
          # Use your specific style: Pixar 3D + high detail
          PROMPT="Pixar style 3D illustration of a futuristic Indian temple, cinematic lighting, 8k"
          ENCODED_PROMPT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$PROMPT'))")
          
          # 2. Add random seed to ensure a new image every time
          SEED=$RANDOM
          
          # 3. Download using the public image.pollinations.ai endpoint
          # No key needed here. 
          # Parameters: nologo=true (removes watermark), flux (high quality model)
          IMAGE_URL="https://image.pollinations.ai/prompt/${ENCODED_PROMPT}?seed=${SEED}&width=1024&height=1024&nologo=true&model=flux"
          
          echo "Generating: $IMAGE_URL"
          curl -L -o "generated_images/image_${SEED}.jpg" "$IMAGE_URL"

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add generated_images/
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add new AI generated image (Seed $RANDOM) [skip ci]"
            git push
          fi
