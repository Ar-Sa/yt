name: AI Image Generation

on:
  workflow_dispatch: # Allows manual trigger
  #schedule:
   # - cron: "0 0 * * *" # Optional: Runs daily at midnight

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for pushing the image back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install google-genai

      - name: Create Images Directory
        run: mkdir -p images

      - name: Generate Image
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Set this in GitHub Repo Settings > Secrets
        run: |
          python <<EOF
          import os
          import mimetypes
          import time
          from google import genai
          from google.genai import types

          def save_binary_file(file_name, data):
              with open(file_name, "wb") as f:
                  f.write(data)
              print(f"File saved to: {file_name}")

          def generate():
              client = genai.Client(api_key="AIzaSyBRiqEkzpS6dk-J3yLRKEeHq56M1yMFbhA")
              
              # Using the latest image-capable model
              model = "gemini-2.5-flash-image" 
              
              prompt = "A Pixar-style 3D illustration of a vibrant Indian temple, 8k, high detail"
              
              contents = [
                  types.Content(
                      role="user",
                      parts=[types.Part.from_text(text=prompt)],
                  ),
              ]
              
              generate_content_config = types.GenerateContentConfig(
                  response_modalities=["IMAGE"],
              )

              print("Generating image...")
              file_index = int(time.time()) # Unique filename using timestamp
              
              # Gemini generates images via stream
              for chunk in client.models.generate_content_stream(
                  model=model,
                  contents=contents,
                  config=generate_content_config,
              ):
                  if not chunk.parts:
                      continue
                      
                  # Check if the part contains image data
                  if chunk.parts[0].inline_data and chunk.parts[0].inline_data.data:
                      inline_data = chunk.parts[0].inline_data
                      data_buffer = inline_data.data
                      file_extension = mimetypes.guess_extension(inline_data.mime_type) or ".png"
                      
                      file_path = f"images/gemini_gen_{file_index}{file_extension}"
                      save_binary_file(file_path, data_buffer)
                  else:
                      if chunk.text:
                          print(f"Text Response: {chunk.text}")

          if __name__ == "__main__":
              generate()
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "Add Gemini generated image [skip ci]" || echo "No changes to commit"
          git push
