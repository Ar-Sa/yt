name: AI Content Simple
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Print AI Content
        run: |
          # The key must be passed as '?key=' at the end of the URL for the /text/ endpoint
          # We use --data-urlencode for the prompt to handle the special characters
          
          echo "### Requesting Claude-Airforce via Text Endpoint ###"
          
          curl -G "https://gen.pollinations.ai/text/Generate%20ONE%20highly%20searched%20How%20does%20X%20work%20question%20with%20detailed%20answer%20in%20json%20format.%20title,%20thumbnail_text,%20description,%20content_text%20must%20in%20Hindi%20but%20keep%20medical%20terms%20in%20English." \
            --data-urlencode "model=claude-airforce" \
            --data-urlencode "key=sk_jliUV8OHgrLOzMha6PHSZb42zQVtIyaQ" \
            --data-urlencode "json=true" \
            --data-urlencode "seed=$RANDOM"
