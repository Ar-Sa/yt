name: AI Content
on:
  workflow_dispatch: # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests
        
      
      - name: Fetch and Print AI Content
        run: |
          prompt = "Generate ONE highly searched "How does X work" question with detailed answer in json format mentioned in instructions. title, thumbnail_text, description, content_text must be in natural spoken hindi but keep medical term, numbers, place/form/job/company/subject name etc in english (ex-H1B, oncologist, doctor, paris, cancer). also what is latest trending news in india?"
          echo "### Querying AI for: ###"
          echo ""
          # We use 'openai-fast' because 'claude-airforce' now requires a token.
          # We remove the '-o' flag so it prints to the terminal instead of a file.
          curl -G "https://gen.pollinations.ai/text/$(echo $prompt | sed 's/ /%20/g')" \
            --data-urlencode "model=openai-fast" \
            --data-urlencode "system=You are a professional Cloud Architect. Provide a concise technical summary."
          echo ""
          echo "### Generation Complete ###"
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_content.md
          git commit -m "Add latest AI generated content" || echo "No changes to commit"
          git push
