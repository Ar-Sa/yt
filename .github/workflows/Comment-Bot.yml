name: Comment Bot

on:
  schedule:
    - cron: '0 5 * * *'  
  #push:
  #  branches:
  #    - main  # Adjust the branch name as needed
  #pull_request:
  #  branches:
  #    - main  # Adjust the branch name as needed
  # Allows you to run this workflow manually from the Actions tab #
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest version of Ubuntu as the runner

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2  # Checkout your repository's code

    - name: Set up Python
      uses: actions/setup-python@v2  # Set up Python on the runner
      with:
        python-version: '3.x'  # Specify the Python version (e.g., 3.6, 3.7, etc.)

    - name: Checkout private tools
      uses: actions/checkout@v4
      with:
        repository: Ar-Sa/SMbot
        ref: yt-v1-images-major-changes
        token: ${{ secrets.SMBOTPAT }}
        path: SMbot

    - name: Install dependencies
      run: pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client facebook-sdk openai azure-cognitiveservices-speech moviepy==1.0.3 Pillow numpy imageio imageio-ffmpeg decorator tqdm langdetect matplotlib
    
    - name: Run  Script
      run: |
        echo "Current Working Directory: $PWD"
        ls -l | grep '^d' | awk '{print $9}'
        cd SMbot/ytpy/py
        ls -l | grep '^d' | awk '{print $9}'
        python comment_bot.py

